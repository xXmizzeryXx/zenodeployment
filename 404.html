<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ZENO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #050508;
    --bg2: #0a0a12;
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-purple: #bf00ff;
    --neon-green: #00ff88;
    --neon-yellow: #ffe600;
    --card-bg: rgba(255,255,255,0.03);
    --card-border: rgba(0,245,255,0.12);
    --text: #e0e8ff;
    --muted: #4a5068;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0; pointer-events: none;
  }
  .bg-glow {
    position: fixed; width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(255,0,110,0.05) 0%, transparent 65%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 0; pointer-events: none;
  }
  .bg-glow-purple {
    position: fixed; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(191,0,255,0.04) 0%, transparent 65%);
    bottom: -100px; left: -100px; z-index: 0; pointer-events: none;
  }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    z-index: 0; pointer-events: none;
  }

  .container {
    z-index: 1; position: relative;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 2rem;
  }

  .error-code {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(7rem, 22vw, 16rem);
    font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,0,110,0.25);
    letter-spacing: 8px;
    line-height: 1;
    position: relative;
    user-select: none;
    animation: fadeSlideUp 0.7s ease both;
  }

  .error-code .glitch-layer {
    position: absolute; inset: 0;
    font-family: 'Orbitron', sans-serif;
    font-size: inherit;
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1;
    color: var(--neon-pink);
    text-shadow: 0 0 40px rgba(255,0,110,0.5), 0 0 100px rgba(255,0,110,0.15);
    animation: glitchMain 4s infinite;
    -webkit-text-stroke: 0;
  }
  .error-code .glitch-cyan {
    color: var(--neon-cyan);
    text-shadow: 0 0 40px rgba(0,245,255,0.4);
    animation: glitchCyan 4s infinite;
    opacity: 0;
  }
  .error-code .glitch-purple {
    color: var(--neon-purple);
    text-shadow: 0 0 40px rgba(191,0,255,0.4);
    animation: glitchPurple 4s infinite;
    opacity: 0;
  }

  @keyframes glitchMain {
    0%, 90%, 100% { transform: translate(0,0); clip-path: none; }
    91%  { transform: translate(-4px, 1px); clip-path: inset(20% 0 60% 0); }
    92%  { transform: translate(4px, -1px); clip-path: inset(55% 0 15% 0); }
    93%  { transform: translate(0, 0); clip-path: none; }
    96%  { transform: translate(-3px, 2px); clip-path: inset(40% 0 40% 0); }
    97%  { transform: translate(0, 0); clip-path: none; }
  }
  @keyframes glitchCyan {
    0%, 90%, 100% { opacity: 0; transform: translate(0,0); }
    91%  { opacity: 0.7; transform: translate(5px, -2px); clip-path: inset(20% 0 60% 0); }
    92%  { opacity: 0; }
    96%  { opacity: 0.5; transform: translate(-5px, 2px); clip-path: inset(55% 0 20% 0); }
    97%  { opacity: 0; }
  }
  @keyframes glitchPurple {
    0%, 90%, 100% { opacity: 0; transform: translate(0,0); }
    91%  { opacity: 0; }
    92%  { opacity: 0.6; transform: translate(-3px, 1px); clip-path: inset(55% 0 15% 0); }
    93%  { opacity: 0; }
  }

  .divider-line {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
    margin: 0.6rem auto 1.6rem;
    animation: expandLine 0.8s 0.3s ease both;
  }
  @keyframes expandLine {
    from { width: 0; }
    to   { width: 320px; }
  }

  .error-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem; letter-spacing: 6px;
    color: var(--neon-pink);
    text-shadow: 0 0 16px rgba(255,0,110,0.4);
    text-transform: uppercase;
    animation: fadeSlideUp 0.7s 0.15s ease both;
  }

  .error-message {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem; font-weight: 400;
    color: var(--muted); letter-spacing: 1.5px;
    max-width: 380px; line-height: 1.6;
    margin-bottom: 2.8rem;
    animation: fadeSlideUp 0.7s 0.3s ease both;
  }
  .error-message span {
    color: var(--neon-cyan);
    text-shadow: 0 0 12px rgba(0,245,255,0.3);
  }

  .btn-group {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center;
    animation: fadeSlideUp 0.7s 0.45s ease both;
  }

  .mbtn {
    background: linear-gradient(135deg, rgba(0,245,255,0.10), rgba(191,0,255,0.10));
    border: 1px solid rgba(0,245,255,0.28);
    color: var(--neon-cyan);
    padding: 0.8rem 2.2rem;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 3px;
    border-radius: 8px; cursor: pointer;
    text-decoration: none;
    transition: all 0.25s; display: inline-flex; align-items: center; gap: 10px;
  }
  .mbtn:hover {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 24px rgba(0,245,255,0.15), 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(-3px);
  }
  .mbtn-muted {
    background: transparent;
    border-color: rgba(255,255,255,0.08);
    color: var(--muted);
  }
  .mbtn-muted:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
    box-shadow: none;
  }

  .logo-badge {
    position: fixed; top: 28px; left: 32px; z-index: 10;
    font-family: 'Orbitron', sans-serif; font-size: 1rem;
    font-weight: 900; letter-spacing: 6px;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.4);
    text-decoration: none;
    transition: all 0.2s;
  }
  .logo-badge:hover {
    text-shadow: 0 0 40px rgba(0,245,255,0.7);
  }

  .status-bar {
    position: fixed; bottom: 22px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 2rem;
    z-index: 10;
    animation: fadeSlideUp 0.7s 0.6s ease both;
  }
  .status-item {
    font-family: 'Orbitron', sans-serif; font-size: 8px;
    letter-spacing: 2px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--neon-pink);
    box-shadow: 0 0 6px var(--neon-pink);
    animation: blink 1.8s infinite;
  }
  .status-dot.ok { background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green); animation: none; }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .noise-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow-purple"></div>
<div class="scanlines"></div>
<div class="noise-overlay"></div>

<a href="index.html" class="logo-badge">ZENO</a>

<div class="container">
  <div class="error-label">SIGNAL LOST</div>

  <div class="error-code">
    <div class="glitch-layer glitch-purple">404</div>
    <div class="glitch-layer glitch-cyan">404</div>
    <div class="glitch-layer">404</div>
    404
  </div>

  <div class="divider-line"></div>

  <p class="error-message">
    The page you're looking for has <span>vanished from the grid.</span><br>
    It may have been moved, deleted, or never existed.
  </p>

  <div class="btn-group">
    <a href="index.html" class="mbtn">
      <i class="fas fa-house"></i> RETURN HOME
    </a>
    <a href="javascript:history.back()" class="mbtn mbtn-muted">
      <i class="fas fa-chevron-left"></i> GO BACK
    </a>
  </div>
</div>

<div class="status-bar">
  <div class="status-item">
    <div class="status-dot"></div>
    ERROR 404
  </div>
  <div class="status-item">
    <div class="status-dot ok"></div>
    SYSTEM ONLINE
  </div>
  <div class="status-item">
    <div class="status-dot ok"></div>
    ECLIPSE SUITE
  </div>
</div>

</body>
</html>
