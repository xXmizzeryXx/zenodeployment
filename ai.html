<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeno — AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #02030a;
  --bg2: #060810;
  --cyan: #00f5ff;
  --pink: #ff006e;
  --purple: #bf00ff;
  --green: #00ff88;
  --text: #c8d8ff;
  --muted: #3a4060;
  --dim: #1a2040;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.012) 2px, rgba(0,245,255,0.012) 4px);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  pointer-events: none; z-index: 0;
}

.top-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 44px;
  background: rgba(2,3,10,0.95);
  border-bottom: 1px solid rgba(0,245,255,0.08);
  flex-shrink: 0;
}
.tb-left { display: flex; align-items: center; gap: 14px; }
.tb-dots { display: flex; gap: 6px; }
.dot { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; transition: filter .2s; }
.dot.red { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green-dot { background: #28c840; }
.dot:hover { filter: brightness(1.3); }
.tb-title {
  font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 3px;
  color: var(--muted);
}
.tb-right { display: flex; align-items: center; gap: 10px; }
.btn-home {
  display: flex; align-items: center; gap: 6px;
  text-decoration: none; font-family: 'Orbitron', monospace;
  font-size: 8px; letter-spacing: 2px; color: var(--muted);
  border: 1px solid rgba(0,245,255,0.1); border-radius: 3px;
  padding: 5px 10px; transition: all .2s;
}
.btn-home:hover { color: var(--cyan); border-color: rgba(0,245,255,0.35); }
.model-badge {
  font-family: 'Orbitron', monospace; font-size: 7px; letter-spacing: 2px;
  color: var(--purple); border: 1px solid rgba(191,0,255,0.25);
  padding: 4px 9px; border-radius: 3px; background: rgba(191,0,255,0.04);
}
.status-dot-wrap { display: flex; align-items: center; gap: 5px; font-family: 'Orbitron', monospace; font-size: 7px; letter-spacing: 2px; color: var(--muted); }
.status-dot-live { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

.chat-area {
  flex: 1; overflow-y: auto;
  padding: 20px 24px 8px;
  position: relative; z-index: 1;
  display: flex; flex-direction: column; gap: 0;
}
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.1); border-radius: 3px; }

.boot-msg {
  font-size: 11px; color: var(--muted); line-height: 1.8;
  margin-bottom: 20px; border-left: 1px solid var(--dim); padding-left: 14px;
}
.boot-msg .hi { color: var(--cyan); font-size: 12px; }

.msg { display: flex; flex-direction: column; gap: 2px; margin-bottom: 18px; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }

.msg-prompt {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: var(--green); line-height: 1.6;
}
.msg-prompt .prompt-arrow { color: var(--cyan); flex-shrink: 0; user-select: none; }
.msg-prompt .prompt-user { color: var(--muted); flex-shrink: 0; }

.msg-response {
  padding-left: 24px; font-size: 13px;
  color: var(--text); line-height: 1.75;
  white-space: pre-wrap; word-break: break-word;
}
.msg-response.thinking {
  color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.think-dots span {
  display: inline-block; width: 4px; height: 4px; border-radius: 50%;
  background: var(--cyan); margin: 0 1px;
  animation: thinkBounce .9s ease infinite;
}
.think-dots span:nth-child(2) { animation-delay: .15s; }
.think-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes thinkBounce { 0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-4px);opacity:1} }

.msg-response code {
  background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.1);
  border-radius: 3px; padding: 1px 5px; font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--cyan);
}
.msg-response pre {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(0,245,255,0.08);
  border-radius: 6px; padding: 12px 14px; margin: 8px 0;
  overflow-x: auto; font-size: 12px; color: #a0c8a0;
  font-family: 'JetBrains Mono', monospace; line-height: 1.6;
}
.msg-response pre::-webkit-scrollbar { height: 3px; }
.msg-response pre::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.15); border-radius: 3px; }

.msg-meta {
  padding-left: 24px; font-size: 10px; color: var(--dim);
  margin-top: 2px; display: flex; align-items: center; gap: 8px;
}

.error-msg {
  padding-left: 24px; font-size: 12px; color: var(--pink);
  display: flex; align-items: center; gap: 8px;
}

.input-row {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 0;
  padding: 10px 24px 14px;
  border-top: 1px solid rgba(0,245,255,0.06);
  background: rgba(2,3,10,0.97); flex-shrink: 0;
}
.input-prompt {
  font-size: 13px; color: var(--cyan); flex-shrink: 0;
  user-select: none; display: flex; align-items: center; gap: 4px;
}
.input-prompt .u { color: var(--green); }
.input-prompt .sep { color: var(--muted); }
.input-prompt .arrow { color: var(--cyan); margin: 0 6px; }
#userInput {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--green); caret-color: var(--green); letter-spacing: .3px;
}
#userInput::selection { background: rgba(0,245,255,0.2); }
.send-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 13px; padding: 2px 4px;
  transition: color .2s; flex-shrink: 0;
}
.send-btn:hover { color: var(--cyan); }
.send-btn:disabled { opacity: .3; cursor: not-allowed; }

.char-count {
  font-size: 9px; color: var(--dim); flex-shrink: 0;
  letter-spacing: 1px; margin-right: 6px;
}

.clear-btn {
  position: absolute; bottom: 52px; right: 24px;
  font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 2px;
  color: var(--muted); background: none; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 3px; padding: 4px 10px; cursor: pointer; transition: all .2s;
}
.clear-btn:hover { color: var(--pink); border-color: rgba(255,0,110,0.25); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-dots">
      <div class="dot red" onclick="window.location.href='index.html'"></div>
      <div class="dot yellow"></div>
      <div class="dot green-dot"></div>
    </div>
    <div class="tb-title">zeno@eclipse: ~/ai</div>
  </div>
  <div class="tb-right">
    <div class="status-dot-wrap"><div class="status-dot-live"></div>ONLINE</div>
    <div class="model-badge">LLAMA-3.3-70B</div>
    <a href="index.html" class="btn-home"><i class="fa-solid fa-chevron-left"></i> HOME</a>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="boot-msg" id="bootMsg">
    <div class="hi">Zeno AI — powered by Groq</div>
    <div>Model &nbsp;&nbsp;&nbsp;: llama-3.3-70b-versatile</div>
    <div>Context : 128k tokens</div>
    <div>Status &nbsp;: ready</div>
    <br>
    <div id="bootWelcome"></div>
    <br>
    <div>Type and press Enter to start. Ctrl+L to clear.</div>
  </div>
</div>

<div class="input-row">
  <div class="input-prompt">
    <span class="u" id="inputUser">guest</span><span class="sep">@</span><span style="color:var(--cyan)">zeno-ai</span><span class="sep">:</span><span style="color:var(--purple)">~</span><span class="arrow">❯</span>
  </div>
  <input type="text" id="userInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus placeholder="Ask me anything..."/>
  <span class="char-count" id="charCount"></span>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>

<button class="clear-btn" onclick="clearChat()">CLEAR</button>

<script>
const GROQ_API_KEY = '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';
const MODEL = 'llama-3.3-70b-versatile';
const SYSTEM_PROMPT = `You are a sharp, knowledgeable AI assistant running inside Zeno — a browser-based platform built by Eclipse Suite. You are helpful, direct, and technically capable. You can help with coding, writing, math, research, creative tasks, and general questions. Keep responses concise but complete. When showing code, use proper markdown code blocks.`;

const username = (localStorage.getItem('zeno-username') || 'guest').toLowerCase();
document.getElementById('inputUser').textContent = username;
const welcomeName = username !== 'guest' ? username.charAt(0).toUpperCase() + username.slice(1) : 'there';
document.getElementById('bootWelcome').textContent = `Welcome back, ${welcomeName}. I'm your AI assistant built into Zeno. Ask me anything — code, questions, ideas, whatever you need.`;

let messages = [{ role: 'system', content: SYSTEM_PROMPT }];
let isThinking = false;
let historyIdx = -1;
let inputHistory = [];

const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const chatArea = document.getElementById('chatArea');

input.addEventListener('input', () => {
  const len = input.value.length;
  document.getElementById('charCount').textContent = len > 0 ? len : '';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); if (historyIdx < inputHistory.length-1) { historyIdx++; input.value = inputHistory[historyIdx]; } }
  else if (e.key === 'ArrowDown') { e.preventDefault(); if (historyIdx > 0) { historyIdx--; input.value = inputHistory[historyIdx]; } else { historyIdx = -1; input.value = ''; } }
  else if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); clearChat(); }
});

window.addEventListener('focus', () => input.focus());
document.addEventListener('click', e => { if (!e.target.closest('button') && !e.target.closest('a')) input.focus(); });

function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

function appendUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="msg-prompt"><span class="prompt-user">${username}@zeno-ai</span><span class="prompt-arrow">❯</span><span>${esc(text)}</span></div>`;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function appendThinking() {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="msg-response thinking"><span class="think-dots"><span></span><span></span><span></span></span></div>`;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function renderResponse(text, thinkDiv, ms) {
  thinkDiv.innerHTML = `
    <div class="msg-response">${formatResponse(text)}</div>
    <div class="msg-meta"><i class="fa-solid fa-microchip"></i> ${MODEL} &nbsp;•&nbsp; ${ms}ms</div>`;
  scrollBottom();
}

function formatResponse(text) {
  let html = esc(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trimEnd()}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em style="color:var(--muted)">$1</em>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isThinking) return;

  isThinking = true;
  sendBtn.disabled = true;
  input.value = '';
  document.getElementById('charCount').textContent = '';
  inputHistory.unshift(text);
  historyIdx = -1;

  appendUserMsg(text);
  const thinkDiv = appendThinking();

  messages.push({ role: 'user', content: text });

  const start = Date.now();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`,
      },
      body: JSON.stringify({
        model: MODEL,
        messages: messages,
        max_tokens: 2048,
        temperature: 0.7,
        stream: false,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '(no response)';
    const ms = Date.now() - start;

    messages.push({ role: 'assistant', content: reply });
    renderResponse(reply, thinkDiv, ms);

    if (messages.length > 41) {
      messages = [messages[0], ...messages.slice(-40)];
    }

  } catch(e) {
    thinkDiv.innerHTML = `<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> Error: ${esc(e.message)}</div>`;
    messages.pop();
    scrollBottom();
  }

  isThinking = false;
  sendBtn.disabled = false;
  input.focus();
}

function clearChat() {
  const boot = chatArea.querySelector('.boot-msg');
  chatArea.innerHTML = '';
  if (boot) chatArea.appendChild(boot);
  messages = [messages[0]];
}
</script>
</body>
</html>
