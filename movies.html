<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno — Movies</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060608;
            --bg2: #0d0d16;
            --nav-bg: rgba(6, 6, 8, 0.96);
            --neon-cyan: #00f5ff;
            --neon-pink: #ff006e;
            --neon-purple: #bf00ff;
            --neon-green: #00ff88;
            --neon-gold: #ffd700;
            --text: #e8eeff;
            --muted: #5a6080;
            --card-radius: 6px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 40px;
            height: 64px;
            background: linear-gradient(180deg, rgba(6, 6, 8, 0.98) 0%, transparent 100%);
            transition: background .3s;
        }

        .nav.scrolled {
            background: var(--nav-bg);
            box-shadow: 0 1px 0 rgba(0, 245, 255, 0.06);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .nav-logo {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-logo span {
            color: var(--text);
            font-size: 11px;
            letter-spacing: 3px;
            opacity: .5;
            font-weight: 400;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--muted);
            border: 1px solid rgba(0, 245, 255, 0.12);
            border-radius: 4px;
            padding: 6px 12px;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-back:hover {
            color: var(--neon-cyan);
            border-color: rgba(0, 245, 255, 0.4);
            background: rgba(0, 245, 255, 0.05);
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 6px 14px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            text-transform: uppercase;
        }

        .nav-tab.active {
            color: var(--text);
        }

        .nav-tab:hover:not(.active) {
            color: rgba(224, 232, 255, 0.7);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 7px 14px;
            transition: all .25s;
            width: 200px;
        }

        .nav-search-wrap:focus-within {
            border-color: rgba(0, 245, 255, 0.35);
            background: rgba(0, 245, 255, 0.04);
            width: 280px;
        }

        .nav-search-wrap i {
            color: var(--muted);
            font-size: 12px;
            flex-shrink: 0;
        }

        .nav-search-wrap input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            letter-spacing: .5px;
            width: 100%;
        }

        .nav-search-wrap input::placeholder {
            color: var(--muted);
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            width: 100%;
            height: 88vh;
            min-height: 560px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            transition: opacity .8s ease;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(0deg, var(--bg) 0%, rgba(6, 6, 8, 0.5) 40%, rgba(6, 6, 8, 0.1) 70%, transparent 100%),
                linear-gradient(90deg, rgba(6, 6, 8, 0.9) 0%, rgba(6, 6, 8, 0.4) 50%, transparent 100%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 0 60px 70px;
            max-width: 620px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 245, 255, 0.3);
            background: rgba(0, 245, 255, 0.06);
            border-radius: 3px;
            padding: 4px 10px;
            margin-bottom: 14px;
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 4vw, 3.4rem);
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 16px;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .hero-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--neon-gold);
            font-size: 14px;
            font-weight: 600;
        }

        .hero-rating i {
            font-size: 11px;
        }

        .hero-year,
        .hero-runtime {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .hero-genre {
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(224, 232, 255, 0.5);
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-overview {
            font-size: 15px;
            line-height: 1.65;
            color: rgba(224, 232, 255, 0.75);
            margin-bottom: 28px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-hero-play {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            padding: 14px 28px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            background: var(--neon-cyan);
            color: #000;
            font-weight: 700;
            transition: all .2s;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.25);
        }

        .btn-hero-play:hover {
            background: #fff;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.4);
            transform: scale(1.02);
        }

        .btn-hero-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            padding: 14px 22px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            transition: all .2s;
            backdrop-filter: blur(4px);
        }

        .btn-hero-info:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .hero-dots {
            position: absolute;
            bottom: 24px;
            right: 40px;
            z-index: 2;
            display: flex;
            gap: 6px;
        }

        .hero-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all .3s;
            border: none;
        }

        .hero-dot.active {
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
            width: 20px;
            border-radius: 3px;
        }

        /* ── HERO ARROWS ── */
        .hero-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(6, 6, 8, 0.55);
            backdrop-filter: blur(8px);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .3s, background .2s, border-color .2s, transform .2s;
            pointer-events: none;
        }

        .hero:hover .hero-arrow {
            opacity: 1;
            pointer-events: auto;
        }

        .hero-arrow:hover {
            background: rgba(0, 245, 255, 0.15);
            border-color: rgba(0, 245, 255, 0.5);
            color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
        }

        .hero-arrow-left {
            left: 20px;
        }

        .hero-arrow-right {
            right: 20px;
        }

        .hero-arrow:active {
            transform: translateY(-50%) scale(0.93);
        }

        /* ── ROWS ── */
        .rows-container {
            padding: 0 0 60px;
        }

        .row {
            margin-bottom: 8px;
        }

        .row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            margin-bottom: 12px;
        }

        .row-title {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .row-title::before {
            content: '';
            width: 3px;
            height: 14px;
            border-radius: 2px;
            background: var(--neon-cyan);
            display: block;
            box-shadow: 0 0 8px var(--neon-cyan);
        }

        .row-track-wrap {
            position: relative;
        }

        .row-track {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 40px 16px;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .row-track::-webkit-scrollbar {
            display: none;
        }

        .row-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 70px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
            transition: all .2s;
            border-radius: 4px;
        }

        .row-arrow-left {
            left: 0;
            background: linear-gradient(90deg, rgba(6, 6, 8, 0.95) 0%, rgba(6, 6, 8, 0.6) 100%);
            color: var(--text);
        }

        .row-arrow-right {
            right: 0;
            background: linear-gradient(270deg, rgba(6, 6, 8, 0.95) 0%, rgba(6, 6, 8, 0.6) 100%);
            color: var(--text);
        }

        .row-arrow:hover {
            color: var(--neon-cyan);
        }

        /* ── CARDS ── */
        .movie-card {
            flex-shrink: 0;
            width: 170px;
            border-radius: var(--card-radius);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform .25s, box-shadow .25s;
            background: #111118;
        }

        .movie-card:hover {
            transform: scale(1.07);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 245, 255, 0.2);
            z-index: 10;
        }

        .card-poster-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .card-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .3s;
        }

        .movie-card:hover .card-poster {
            transform: scale(1.04);
        }

        .card-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: rgba(0, 245, 255, 0.15);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(6, 6, 8, 0.95) 0%, rgba(6, 6, 8, 0.3) 50%, transparent 100%);
            opacity: 0;
            transition: opacity .25s;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px;
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        .card-play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--neon-cyan);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #000;
            margin-bottom: 8px;
            align-self: flex-start;
            box-shadow: 0 0 16px rgba(0, 245, 255, 0.4);
            transition: transform .15s;
        }

        .card-play-btn:hover {
            transform: scale(1.1);
        }

        .card-overlay-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .3px;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .card-overlay-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-family: 'Orbitron', monospace;
            font-size: 7px;
            letter-spacing: 1px;
        }

        .card-overlay-rating {
            color: var(--neon-gold);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .card-overlay-year {
            color: var(--muted);
        }

        .card-type-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 7px;
            letter-spacing: 1px;
            padding: 2px 6px;
            border-radius: 2px;
            background: rgba(0, 0, 0, 0.75);
        }

        .badge-movie {
            border: 1px solid rgba(0, 245, 255, 0.3);
            color: var(--neon-cyan);
        }

        .badge-tv {
            border: 1px solid rgba(191, 0, 255, 0.3);
            color: var(--neon-purple);
        }

        .movie-card.wide {
            width: 260px;
        }

        .movie-card.wide .card-poster-wrap {
            aspect-ratio: 16/9;
        }

        .card-info {
            padding: 8px 8px 10px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .3px;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-family: 'Orbitron', monospace;
            font-size: 7px;
            letter-spacing: 1px;
        }

        .card-rating {
            color: var(--neon-gold);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .card-year {
            color: var(--muted);
        }

        /* ── PLAYER OVERLAY ── */
        .player-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(16px);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .player-overlay.open {
            display: flex;
        }

        .player-shell {
            position: relative;
            width: 94vw;
            height: 90vh;
            max-width: 1400px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 245, 255, 0.15);
            box-shadow: 0 0 100px rgba(0, 245, 255, 0.05);
            display: flex;
            flex-direction: column;
            animation: popIn .2s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.96);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: rgba(6, 6, 8, 0.98);
            border-bottom: 1px solid rgba(0, 245, 255, 0.07);
            flex-shrink: 0;
            z-index: 1;
        }

        .player-thumb {
            width: 30px;
            height: 44px;
            border-radius: 3px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid rgba(0, 245, 255, 0.15);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-sub {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .player-ep-desc {
            font-size: 11px;
            color: rgba(90, 96, 128, 0.8);
            letter-spacing: .3px;
            margin-top: 3px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 600px;
        }

        .tv-controls {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .tv-controls.on {
            display: flex;
        }

        .tv-sel {
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 5px;
            color: var(--text);
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 1px;
            padding: 5px 10px;
            outline: none;
            cursor: pointer;
        }

        .tv-sel option {
            background: #0d0d16;
        }

        .player-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: var(--muted);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: all .2s;
            flex-shrink: 0;
        }

        .player-btn:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        .player-btn.cls:hover {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
        }

        .player-btn.kb-focus {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 14px rgba(0, 245, 255, 0.45);
            outline: none;
        }

        .player-btn.cls.kb-focus {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
            box-shadow: 0 0 14px rgba(255, 0, 110, 0.45);
        }

        .player-loading {
            position: absolute;
            inset: 52px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            gap: 14px;
            transition: opacity .3s;
        }

        .player-loading.gone {
            opacity: 0;
            pointer-events: none;
        }

        .spin {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(0, 245, 255, 0.1);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin-label {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--muted);
        }

        .player-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        /* ── FULLSCREEN DETAIL PAGE ── */
        .detail-page {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            overflow-y: auto;
            background: var(--bg);
            animation: detailIn .35s cubic-bezier(.2, .8, .3, 1) both;
        }

        .detail-page.open {
            display: block;
        }

        @keyframes detailIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hero backdrop - full width */
        .dp-hero {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 480px;
            overflow: hidden;
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
        }

        .dp-hero-grad {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(0deg, var(--bg) 0%, rgba(6, 6, 8, 0.6) 35%, rgba(6, 6, 8, 0.15) 65%, rgba(6, 6, 8, 0.4) 100%),
                linear-gradient(90deg, rgba(6, 6, 8, 0.85) 0%, rgba(6, 6, 8, 0.3) 60%, transparent 100%);
        }

        /* Close button */
        .dp-close {
            position: fixed;
            top: 20px;
            right: 28px;
            z-index: 400;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(6, 6, 8, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 16px;
            transition: all .2s;
            backdrop-filter: blur(8px);
        }

        .dp-close:hover {
            background: rgba(255, 0, 110, 0.2);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        /* Hero content */
        .dp-hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 60px 48px;
            display: flex;
            align-items: flex-end;
            gap: 40px;
            z-index: 1;
        }

        .dp-poster-thumb {
            width: 160px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .dp-poster-thumb img {
            width: 100%;
            display: block;
        }

        .dp-hero-text {
            flex: 1;
        }

        .dp-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 3px;
            padding: 3px 10px;
            border-radius: 3px;
            margin-bottom: 12px;
        }

        .dp-type-badge.movie {
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 245, 255, 0.3);
            background: rgba(0, 245, 255, 0.06);
        }

        .dp-type-badge.tv {
            color: var(--neon-purple);
            border: 1px solid rgba(191, 0, 255, 0.3);
            background: rgba(191, 0, 255, 0.06);
        }

        .dp-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 4.5vw, 4rem);
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1.05;
            color: #fff;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 0.9);
            margin-bottom: 16px;
        }

        .dp-meta-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .dp-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--neon-gold);
            font-size: 15px;
            font-weight: 700;
        }

        .dp-rating i {
            font-size: 12px;
        }

        .dp-year {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .dp-runtime {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .dp-genre-tag {
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(224, 232, 255, 0.5);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
        }

        .dp-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .dp-btn-play {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 15px 32px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            background: var(--neon-cyan);
            color: #000;
            font-weight: 700;
            transition: all .2s;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        .dp-btn-play:hover {
            background: #fff;
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.5);
            transform: scale(1.02);
        }

        /* Body below hero */
        .dp-body {
            padding: 0 60px 80px;
        }

        /* Overview + details two-col */
        .dp-info-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 50px;
            padding: 40px 0 48px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .dp-overview {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(224, 232, 255, 0.78);
        }

        .dp-side-label {
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 3px;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .dp-side-val {
            font-size: 14px;
            color: rgba(224, 232, 255, 0.75);
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .dp-side-val strong {
            color: var(--text);
        }

        /* ── EPISODE SECTION ── */
        .dp-ep-section {
            padding-top: 40px;
        }

        .dp-ep-section-title {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .dp-ep-section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            border-radius: 2px;
            background: var(--neon-purple);
            display: block;
            box-shadow: 0 0 8px var(--neon-purple);
        }

        /* Season selector tabs */
        .season-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .season-tab {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            transition: all .2s;
        }

        .season-tab.active {
            color: var(--neon-purple);
            border-color: rgba(191, 0, 255, 0.4);
            background: rgba(191, 0, 255, 0.08);
            box-shadow: 0 0 16px rgba(191, 0, 255, 0.1);
        }

        .season-tab:hover:not(.active) {
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Episode card grid */
        .ep-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        .ep-card {
            background: #0e0e1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all .22s;
            display: flex;
            flex-direction: column;
        }

        .ep-card:hover {
            border-color: rgba(191, 0, 255, 0.3);
            background: #13132a;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .ep-thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #0d0d1a;
            flex-shrink: 0;
        }

        .ep-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .3s;
        }

        .ep-card:hover .ep-thumb {
            transform: scale(1.05);
        }

        .ep-thumb-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(191, 0, 255, 0.15);
        }

        .ep-num-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(0, 0, 0, 0.8);
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .ep-play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity .2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ep-card:hover .ep-play-overlay {
            opacity: 1;
        }

        .ep-play-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(191, 0, 255, 0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 0 30px rgba(191, 0, 255, 0.5);
            transition: transform .15s;
        }

        .ep-play-btn:hover {
            transform: scale(1.08);
        }

        .ep-card-body {
            padding: 14px 16px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .ep-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .ep-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            flex: 1;
        }

        .ep-card-meta {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .ep-card-rating {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--neon-gold);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ep-card-runtime {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--muted);
        }

        .ep-card-airdate {
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .ep-card-desc {
            font-size: 12px;
            line-height: 1.65;
            color: rgba(224, 232, 255, 0.5);
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ep-card-desc.empty {
            font-style: italic;
            color: rgba(90, 96, 128, 0.5);
        }

        .ep-grid-loading {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 16px;
        }

        .ep-grid-loading .spin {
            width: 32px;
            height: 32px;
            border-color: rgba(191, 0, 255, 0.15);
            border-top-color: var(--neon-purple);
        }

        .ep-grid-loading span {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--muted);
        }

        /* ── CW CARDS ── */
        .cw-card {
            flex-shrink: 0;
            width: 260px;
            border-radius: var(--card-radius);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #111118;
            transition: transform .25s, box-shadow .25s;
        }

        .cw-card:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 245, 255, 0.2);
            z-index: 10;
        }

        .cw-poster-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .cw-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .3s;
        }

        .cw-card:hover .cw-poster {
            transform: scale(1.04);
        }

        .cw-poster-ph {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(0, 245, 255, 0.15);
        }

        .cw-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
        }

        .cw-progress-fill {
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 6px var(--neon-cyan);
            transition: width .3s;
        }

        .cw-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(6, 6, 8, 0.92) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cw-card:hover .cw-overlay {
            opacity: 1;
        }

        .cw-play-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: transform .15s;
        }

        .cw-play-btn:hover {
            transform: scale(1.1);
        }

        .cw-info {
            padding: 8px 10px 10px;
        }

        .cw-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 3px;
        }

        .cw-sub {
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cw-remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 5;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            font-size: 9px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .cw-card:hover .cw-remove-btn {
            display: flex;
        }

        .cw-remove-btn:hover {
            background: rgba(255, 0, 110, 0.7);
            color: #fff;
            border-color: transparent;
        }

        /* Utility */
        .state-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            text-align: center;
            gap: 14px;
            padding: 40px;
        }

        .state-icon {
            font-size: 3rem;
            color: rgba(0, 245, 255, 0.15);
        }

        .state-title {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--muted);
        }

        .state-sub {
            font-size: 13px;
            color: rgba(90, 96, 128, 0.7);
        }

        .skel-card {
            flex-shrink: 0;
            width: 170px;
            border-radius: var(--card-radius);
            background: #0d0d16;
            overflow: hidden;
            animation: shimmer 1.6s ease infinite;
        }

        .skel-card.wide {
            width: 260px;
        }

        .skel-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #161624;
        }

        .skel-poster.wide {
            aspect-ratio: 16/9;
        }

        .skel-info {
            padding: 8px;
        }

        .skel-line {
            height: 8px;
            border-radius: 3px;
            background: #1e1e30;
            margin-bottom: 5px;
        }

        .skel-line.short {
            width: 55%;
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 0 40px 60px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(10, 10, 20, 0.97);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 6px;
            padding: 12px 24px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            z-index: 9999;
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
            white-space: nowrap;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.08);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.err {
            border-color: rgba(255, 0, 110, 0.3);
            color: var(--neon-pink);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp .4s ease both;
        }

        /* ── KEYBOARD NAVIGATION FOCUS ── */
        .kb-focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--neon-cyan), 0 0 28px rgba(0, 245, 255, 0.5) !important;
            transform: scale(1.08) !important;
            z-index: 20 !important;
            position: relative;
        }

        .kb-focus .card-overlay,
        .kb-focus .cw-overlay {
            opacity: 1;
        }

        /* Keyboard mode hint toast */
        #kbHint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 6px;
            padding: 8px 20px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(0, 245, 255, 0.7);
            z-index: 9998;
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s, transform .3s;
        }

        #kbHint.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #kbHint kbd {
            background: rgba(0, 245, 255, 0.12);
            border: 1px solid rgba(0, 245, 255, 0.25);
            border-radius: 3px;
            padding: 2px 7px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            color: var(--neon-cyan);
        }
    </style>
</head>

<body>

    <div class="toast" id="toast"></div>
    <div id="kbHint"><kbd>↑↓</kbd> Rows &nbsp; <kbd>←→</kbd> Cards &nbsp; <kbd>Enter</kbd> Select &nbsp; <kbd>Esc</kbd> Back</div>

    <nav class="nav" id="nav">
        <div class="nav-left">
            <a href="index.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> HOME</a>
            <a href="movies.html" class="nav-logo">ZENO <span>// STREAM</span></a>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="home" onclick="switchTab('home',this)">Home</button>
                <button class="nav-tab" data-tab="movies" onclick="switchTab('movies',this)">Movies</button>
                <button class="nav-tab" data-tab="tv" onclick="switchTab('tv',this)">TV Shows</button>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search..." autocomplete="off" />
            </div>
        </div>
    </nav>

    <!-- PLAYER -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-shell">
            <div class="player-header">
                <img class="player-thumb" id="playerThumb" src="" alt="" onerror="this.style.display='none'">
                <div class="player-info">
                    <div class="player-title" id="playerTitle">LOADING...</div>
                    <div class="player-sub" id="playerSub"></div>
                    <div class="player-ep-desc" id="playerEpDesc" style="display:none"></div>
                </div>
                <div class="tv-controls" id="tvControls">
                    <select class="tv-sel" id="seasonSel" onchange="onSeasonChange()"></select>
                    <select class="tv-sel" id="episodeSel" onchange="loadEpisode()"></select>
                </div>
                <button class="player-btn" onclick="toggleFS()"><i class="fa-solid fa-expand"></i></button>
                <button class="player-btn cls" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="player-loading" id="playerLoading">
                <div class="spin"></div>
                <div class="spin-label">LOADING STREAM</div>
            </div>
            <iframe class="player-frame" id="playerFrame" src="" allowfullscreen
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
        </div>
    </div>

    <!-- FULLSCREEN DETAIL PAGE -->
    <div class="detail-page" id="detailPage">
        <button class="dp-close" onclick="closeDetail()" title="Close"><i class="fa-solid fa-xmark"></i></button>

        <div class="dp-hero" id="dpHero">
            <div class="dp-hero-grad"></div>
            <div class="dp-hero-content">
                <div class="dp-hero-text">
                    <div class="dp-type-badge movie" id="dpTypeBadge"><i class="fa-solid fa-film"></i> MOVIE</div>
                    <div class="dp-title" id="dpTitle">—</div>
                    <div class="dp-meta-row" id="dpMetaRow"></div>
                    <div class="dp-actions">
                        <button class="dp-btn-play" id="dpPlayBtn"><i class="fa-solid fa-play"></i> WATCH NOW</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="dp-body">
            <div class="dp-info-grid">
                <div>
                    <div class="dp-overview" id="dpOverview"></div>
                </div>
                <div>
                    <div id="dpSideContent"></div>
                </div>
            </div>

            <!-- TV Episodes -->
            <div class="dp-ep-section" id="dpEpSection" style="display:none">
                <div class="dp-ep-section-title">EPISODES</div>
                <div class="season-tabs" id="seasonTabs"></div>
                <div class="ep-grid" id="epGrid">
                    <div class="ep-grid-loading">
                        <div class="spin"></div><span>LOADING EPISODES</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main id="main"></main>

    <script>
        const TMDB_KEY = 'd3b2dfc2f1a5edd7494e2a6f778b4fb9';
        const TMDB = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/';

        // Vidcore embed URLs (TMDB IDs)
        function embedUrl(type, id, s, e) {
            if (type === 'movie') return `https://vidcore.net/movie/${id}?autoPlay=true`;
            return `https://vidcore.net/tv/${id}/${s}/${e}?autoPlay=true&nextButton=true&autoNext=true`;
        }

        let currentDetail = null;
        let currentPlayer = null;
        let heroItems = [];
        let heroIdx = 0;
        let heroTimer = null;
        let currentTab = 'home';
        let searchTimer = null;
        let currentDetailSeason = 1;

        const epCache = {};

        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(searchTimer);
            const q = e.target.value.trim();
            if (!q) { switchTab(currentTab, document.querySelector('.nav-tab.active')); return; }
            searchTimer = setTimeout(() => doSearch(q), 360);
        });
        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Escape') { e.target.value = ''; switchTab(currentTab, document.querySelector('.nav-tab.active')); }
        });
        // ── KEYBOARD SPATIAL NAVIGATION ──
        let kbRowIdx = -1;   // -1 = hero zone
        let kbCardIdx = 0;
        let kbActive = false;
        let kbHintTimer = null;
        let kbPlayerBtnIdx = -1; // index into player header buttons

        function kbGetRows() {
            return Array.from(document.querySelectorAll('.rows-container .row-track'))
                .filter(t => t.querySelector('.movie-card, .cw-card'));
        }
        function kbGetCards(track) {
            return Array.from(track.querySelectorAll('.movie-card, .cw-card'));
        }
        function kbClearFocus() {
            document.querySelectorAll('.kb-focus').forEach(el => el.classList.remove('kb-focus'));
        }
        function kbSetFocus(rowIdx, cardIdx) {
            kbClearFocus();
            const rows = kbGetRows();
            if (rowIdx < 0 || !rows.length) { kbRowIdx = -1; kbCardIdx = 0; return; }
            rowIdx = Math.max(0, Math.min(rowIdx, rows.length - 1));
            const cards = kbGetCards(rows[rowIdx]);
            if (!cards.length) return;
            cardIdx = Math.max(0, Math.min(cardIdx, cards.length - 1));
            kbRowIdx = rowIdx; kbCardIdx = cardIdx;
            const card = cards[cardIdx];
            card.classList.add('kb-focus');
            // Scroll card into view horizontally within its track
            rows[rowIdx].scrollTo({ left: card.offsetLeft - rows[rowIdx].offsetWidth / 2 + card.offsetWidth / 2, behavior: 'smooth' });
            // Scroll the row itself into the viewport vertically
            card.closest('.row')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        function kbShowHint() {
            const hint = document.getElementById('kbHint');
            if (!hint) return;
            hint.classList.add('show');
            clearTimeout(kbHintTimer);
            kbHintTimer = setTimeout(() => hint.classList.remove('show'), 3000);
        }

        // Player header button navigation
        function kbGetPlayerBtns() {
            return Array.from(document.querySelectorAll('#playerOverlay .player-btn'));
        }
        function kbSetPlayerFocus(idx) {
            const btns = kbGetPlayerBtns();
            btns.forEach(b => b.classList.remove('kb-focus'));
            if (idx < 0 || idx >= btns.length) { kbPlayerBtnIdx = -1; return; }
            kbPlayerBtnIdx = idx;
            btns[idx].classList.add('kb-focus');
            btns[idx].scrollIntoView({ block: 'nearest' });
        }
        function kbClearPlayerFocus() {
            kbGetPlayerBtns().forEach(b => b.classList.remove('kb-focus'));
            kbPlayerBtnIdx = -1;
        }
        // Deactivate keyboard mode on mouse movement
        document.addEventListener('mousemove', () => {
            if (kbActive) { kbActive = false; kbClearFocus(); kbRowIdx = -1; }
        });

        window.addEventListener('keydown', e => {
            const playerOpen = document.getElementById('playerOverlay').classList.contains('open');
            const detailOpen = document.getElementById('detailPage').classList.contains('open');
            const searchFocused = document.activeElement === document.getElementById('searchInput');
            const isArrow = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key);
            const isEnter = e.key === 'Enter';

            if (e.key === 'Escape') { closePlayer(); closeDetail(); return; }

            // Player overlay navigation
            if (playerOpen) {
                if (!isArrow && !isEnter && e.key !== 'f' && e.key !== 'F') return;
                e.preventDefault();
                // F = instant fullscreen shortcut
                if (e.key === 'f' || e.key === 'F') { toggleFS(); return; }
                const btns = kbGetPlayerBtns();
                if (e.key === 'ArrowRight') {
                    kbSetPlayerFocus(kbPlayerBtnIdx < 0 ? 0 : Math.min(kbPlayerBtnIdx + 1, btns.length - 1));
                } else if (e.key === 'ArrowLeft') {
                    kbSetPlayerFocus(kbPlayerBtnIdx < 0 ? btns.length - 1 : Math.max(kbPlayerBtnIdx - 1, 0));
                } else if (isEnter) {
                    if (kbPlayerBtnIdx >= 0) btns[kbPlayerBtnIdx].click();
                    else toggleFS(); // Enter with no focused btn = fullscreen
                }
                return;
            }

            // Detail page: Enter = play
            if (detailOpen && isEnter) { e.preventDefault(); document.getElementById('dpPlayBtn')?.click(); return; }
            if (playerOpen || detailOpen || searchFocused) return;
            if (!isArrow && !isEnter) return;
            e.preventDefault();

            // First keypress activates kb mode
            if (!kbActive) {
                kbActive = true;
                kbShowHint();
                if (e.key === 'ArrowDown') { kbSetFocus(0, 0); }
                else if (e.key === 'ArrowLeft') { heroNav(-1); }
                else if (e.key === 'ArrowRight') { heroNav(1); }
                else if (isEnter && heroItems[heroIdx]) { openDetail(heroItems[heroIdx]); }
                return;
            }

            // Hero zone
            if (kbRowIdx < 0) {
                if (e.key === 'ArrowLeft')  { heroNav(-1); }
                else if (e.key === 'ArrowRight') { heroNav(1); }
                else if (e.key === 'ArrowDown') { kbSetFocus(0, 0); }
                else if (isEnter && heroItems[heroIdx]) { openDetail(heroItems[heroIdx]); }
                return;
            }

            // Row zone
            const rows = kbGetRows();
            if (e.key === 'ArrowRight') {
                const cards = kbGetCards(rows[kbRowIdx]);
                kbSetFocus(kbRowIdx, Math.min(kbCardIdx + 1, cards.length - 1));
            } else if (e.key === 'ArrowLeft') {
                if (kbCardIdx > 0) kbSetFocus(kbRowIdx, kbCardIdx - 1);
            } else if (e.key === 'ArrowUp') {
                if (kbRowIdx > 0) kbSetFocus(kbRowIdx - 1, kbCardIdx);
                else { kbClearFocus(); kbRowIdx = -1; }  // back to hero
            } else if (e.key === 'ArrowDown') {
                if (kbRowIdx < rows.length - 1) kbSetFocus(kbRowIdx + 1, kbCardIdx);
            } else if (isEnter) {
                const cards = kbGetCards(rows[kbRowIdx]);
                if (cards[kbCardIdx]) cards[kbCardIdx].click();
            }
        });
        document.getElementById('playerOverlay').addEventListener('click', e => {
            if (e.target === document.getElementById('playerOverlay')) closePlayer();
        });

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.getElementById('searchInput').value = '';
            loadTab(tab);
        }

        async function loadTab(tab) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (tab === 'home') await loadHome();
            else if (tab === 'movies') await loadMoviesTab();
            else await loadTVTab();
        }

        async function loadHome() {
            const main = document.getElementById('main');
            main.innerHTML = '';
            const heroEl = document.createElement('div');
            heroEl.className = 'hero';
            heroEl.innerHTML = `<div class="hero-bg" style="background:#0d0d16"></div><div class="hero-content"><div class="hero-title" style="color:#1a1a2e">Loading...</div></div>`;
            main.appendChild(heroEl);
            const rowsEl = document.createElement('div');
            rowsEl.className = 'rows-container';
            rowsEl.innerHTML = buildSkeletonRows(['TRENDING', 'POPULAR MOVIES', 'TOP RATED TV']);
            main.appendChild(rowsEl);
            try {
                const [trending, popMovies, topTV, topMovies, newTV] = await Promise.all([
                    tmdb('/trending/all/day'),
                    tmdb('/movie/popular'),
                    tmdb('/tv/top_rated'),
                    tmdb('/movie/top_rated'),
                    tmdb('/tv/on_the_air'),
                ]);
                heroItems = (trending.results || []).filter(i => i.backdrop_path).slice(0, 6);
                heroIdx = 0;
                const heroDiv = buildHero(heroItems[0]);
                main.replaceChild(heroDiv, main.querySelector('.hero'));
                startHeroCycle();
                rowsEl.innerHTML = '';
                buildCWRow(rowsEl);
                rowsEl.appendChild(buildRow('TRENDING NOW', trending.results || [], false));
                rowsEl.appendChild(buildRow('POPULAR MOVIES', popMovies.results || [], false, 'movie'));
                rowsEl.appendChild(buildRow('TOP RATED TV', topTV.results || [], false, 'tv'));
                rowsEl.appendChild(buildRow('ALL-TIME GREATS', topMovies.results || [], false, 'movie'));
                rowsEl.appendChild(buildRow('NEW EPISODES', newTV.results || [], false, 'tv'));
            } catch (e) {
                console.error(e);
                main.innerHTML = errorState('FAILED TO LOAD — check API key');
            }
        }

        async function loadMoviesTab() {
            const main = document.getElementById('main');
            main.innerHTML = `<div style="height:64px"></div>`;
            const rows = document.createElement('div');
            rows.className = 'rows-container';
            rows.innerHTML = buildSkeletonRows(['POPULAR', 'TOP RATED', 'NOW PLAYING', 'UPCOMING']);
            main.appendChild(rows);
            try {
                const [pop, top, now, upcoming, action, comedy] = await Promise.all([
                    tmdb('/movie/popular'), tmdb('/movie/top_rated'), tmdb('/movie/now_playing'),
                    tmdb('/movie/upcoming'), tmdb('/discover/movie?with_genres=28'), tmdb('/discover/movie?with_genres=35'),
                ]);
                rows.innerHTML = '';
                rows.appendChild(buildRow('POPULAR', pop.results || [], false, 'movie'));
                rows.appendChild(buildRow('TOP RATED', top.results || [], false, 'movie'));
                rows.appendChild(buildRow('NOW PLAYING', now.results || [], false, 'movie'));
                rows.appendChild(buildRow('UPCOMING', upcoming.results || [], false, 'movie'));
                rows.appendChild(buildRow('ACTION', action.results || [], false, 'movie'));
                rows.appendChild(buildRow('COMEDY', comedy.results || [], false, 'movie'));
            } catch (e) { rows.innerHTML = errorState('FAILED TO LOAD'); }
        }

        async function loadTVTab() {
            const main = document.getElementById('main');
            main.innerHTML = `<div style="height:64px"></div>`;
            const rows = document.createElement('div');
            rows.className = 'rows-container';
            rows.innerHTML = buildSkeletonRows(['POPULAR', 'TOP RATED', 'ON THE AIR', 'DRAMA']);
            main.appendChild(rows);
            try {
                const [pop, top, air, drama, comedy] = await Promise.all([
                    tmdb('/tv/popular'), tmdb('/tv/top_rated'), tmdb('/tv/on_the_air'),
                    tmdb('/discover/tv?with_genres=18'), tmdb('/discover/tv?with_genres=35'),
                ]);
                rows.innerHTML = '';
                rows.appendChild(buildRow('POPULAR', pop.results || [], false, 'tv'));
                rows.appendChild(buildRow('TOP RATED', top.results || [], false, 'tv'));
                rows.appendChild(buildRow('ON THE AIR', air.results || [], false, 'tv'));
                rows.appendChild(buildRow('DRAMA', drama.results || [], false, 'tv'));
                rows.appendChild(buildRow('COMEDY', comedy.results || [], false, 'tv'));
            } catch (e) { rows.innerHTML = errorState('FAILED TO LOAD'); }
        }

        async function doSearch(q) {
            stopHeroCycle();
            const main = document.getElementById('main');
            main.innerHTML = `
    <div style="height:80px"></div>
    <div style="padding:0 40px 16px">
      <div class="row-title" style="font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:var(--text);display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="display:block;width:3px;height:14px;border-radius:2px;background:var(--neon-cyan);box-shadow:0 0 8px var(--neon-cyan)"></span>
        RESULTS FOR "${q.toUpperCase()}"
      </div>
    </div>
    <div class="search-grid" id="searchGrid">${skeletonGrid(12)}</div>`;
            try {
                const data = await tmdb(`/search/multi?query=${encodeURIComponent(q)}`);
                const results = (data.results || []).filter(r => r.media_type !== 'person' && (r.poster_path || r.backdrop_path));
                const grid = document.getElementById('searchGrid');
                if (!results.length) {
                    grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><div class="state-icon"><i class="fa-solid fa-film"></i></div><div class="state-title">NO RESULTS</div><div class="state-sub">Nothing found for "${q}"</div></div>`;
                    return;
                }
                grid.innerHTML = '';
                results.forEach((item, i) => { const card = makeCard(item, i, false); grid.appendChild(card); });
            } catch (e) { document.getElementById('searchGrid').innerHTML = errorState('SEARCH FAILED'); }
        }

        // ── HERO ──
        function buildHero(item) {
            if (!item) return document.createElement('div');
            const type = item.media_type || 'movie';
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').slice(0, 4);
            const rating = item.vote_average?.toFixed(1) || '—';
            const overview = item.overview || '';
            const backdrop = item.backdrop_path ? `${IMG}original${item.backdrop_path}` : '';
            const div = document.createElement('div');
            div.className = 'hero';
            div.innerHTML = `
    <div class="hero-bg" style="background-image:url('${backdrop}')"></div>
    <button class="hero-arrow hero-arrow-left" id="heroArrowLeft" onclick="heroNav(-1)" aria-label="Previous"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="hero-arrow hero-arrow-right" id="heroArrowRight" onclick="heroNav(1)" aria-label="Next"><i class="fa-solid fa-chevron-right"></i></button>
    <div class="hero-content">
      <div class="hero-badge"><i class="fa-solid fa-fire"></i> TRENDING</div>
      <div class="hero-title">${esc(title)}</div>
      <div class="hero-meta">
        <span class="hero-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
        <span class="hero-year">${year}</span>
        <span class="hero-genre">${type === 'tv' ? 'TV SHOW' : 'MOVIE'}</span>
      </div>
      <div class="hero-overview">${esc(overview)}</div>
      <div class="hero-actions">
        <button class="btn-hero-play" onclick="quickPlay(window._heroItems[${heroItems.indexOf(item)}])"><i class="fa-solid fa-play"></i> WATCH NOW</button>
        <button class="btn-hero-info" onclick="openDetail(window._heroItems[${heroItems.indexOf(item)}])"><i class="fa-solid fa-info-circle"></i> MORE INFO</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>`;
            window._heroItems = heroItems;
            setTimeout(() => renderHeroDots(div.querySelector('#heroDots')), 0);
            return div;
        }

        function renderHeroDots(container) {
            if (!container) return;
            container.innerHTML = heroItems.map((_, i) =>
                `<button class="hero-dot ${i === heroIdx ? 'active' : ''}" onclick="goHero(${i})"></button>`
            ).join('');
        }
        function goHero(idx) { heroIdx = idx; stopHeroCycle(); updateHero(); startHeroCycle(); }
        function heroNav(dir) {
            if (!heroItems.length) return;
            heroIdx = (heroIdx + dir + heroItems.length) % heroItems.length;
            stopHeroCycle();
            updateHero();
            startHeroCycle();
        }
        function updateHero() {
            const hero = document.querySelector('.hero');
            if (!hero || !heroItems[heroIdx]) return;
            const item = heroItems[heroIdx];
            const backdrop = item.backdrop_path ? `${IMG}original${item.backdrop_path}` : '';
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').slice(0, 4);
            const rating = item.vote_average?.toFixed(1) || '—';
            const overview = item.overview || '';
            const type = item.media_type || 'movie';
            hero.querySelector('.hero-bg').style.backgroundImage = `url('${backdrop}')`;
            hero.querySelector('.hero-title').textContent = title;
            hero.querySelector('.hero-rating').innerHTML = `<i class="fa-solid fa-star"></i> ${rating}`;
            hero.querySelector('.hero-year').textContent = year;
            hero.querySelector('.hero-genre').textContent = type === 'tv' ? 'TV SHOW' : 'MOVIE';
            hero.querySelector('.hero-overview').textContent = overview;
            hero.querySelector('.btn-hero-play').onclick = () => quickPlay(item);
            hero.querySelector('.btn-hero-info').onclick = () => openDetail(item);
            renderHeroDots(document.getElementById('heroDots'));
        }
        function startHeroCycle() { heroTimer = setInterval(() => { heroIdx = (heroIdx + 1) % heroItems.length; updateHero(); }, 6000); }
        function stopHeroCycle() { clearInterval(heroTimer); }

        // ── ROWS & CARDS ──
        function buildRow(label, items, wide = false, forceType) {
            const rowEl = document.createElement('div');
            rowEl.className = 'row fade-up';
            const trackId = 'track-' + Math.random().toString(36).slice(2, 7);
            rowEl.innerHTML = `
    <div class="row-header"><div class="row-title">${label}</div></div>
    <div class="row-track-wrap">
      <button class="row-arrow row-arrow-left" onclick="scrollRow('${trackId}',-1)"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="row-track" id="${trackId}"></div>
      <button class="row-arrow row-arrow-right" onclick="scrollRow('${trackId}',1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>`;
            const track = rowEl.querySelector('.row-track');
            items.slice(0, 20).forEach((item, i) => {
                if (forceType) item = { ...item, media_type: forceType };
                track.appendChild(makeCard(item, i, wide));
            });
            return rowEl;
        }
        function scrollRow(id, dir) { const t = document.getElementById(id); if (t) t.scrollBy({ left: dir * 600, behavior: 'smooth' }); }
        function buildSkeletonRows(labels) {
            return labels.map(l => `<div class="row"><div class="row-header"><div class="row-title">${l}</div></div><div class="row-track-wrap"><div class="row-track">${Array(8).fill(`<div class="skel-card"><div class="skel-poster"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>`).join('')}</div></div></div>`).join('');
        }
        function skeletonGrid(n) { return Array(n).fill(`<div class="skel-card"><div class="skel-poster"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>`).join(''); }

        function makeCard(item, i, wide) {
            const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
            const title = item.title || item.name || 'Unknown';
            const year = (item.release_date || item.first_air_date || '').slice(0, 4);
            const rating = item.vote_average?.toFixed(1) || '—';
            const poster = item.poster_path
                ? `${IMG}${wide ? 'w500' : 'w300'}${wide ? item.backdrop_path || item.poster_path : item.poster_path}`
                : null;
            const card = document.createElement('div');
            card.className = `movie-card${wide ? ' wide' : ''}`;
            card.style.animationDelay = (i * 0.03) + 's';
            card.innerHTML = `
    <div class="card-poster-wrap">
      ${poster ? `<img class="card-poster" src="${poster}" alt="${esc(title)}" loading="lazy">` : `<div class="card-placeholder"><i class="fa-solid fa-film"></i></div>`}
      <div class="card-type-badge ${type === 'tv' ? 'badge-tv' : 'badge-movie'}">${type === 'tv' ? 'TV' : 'FILM'}</div>
      <div class="card-overlay">
        <button class="card-play-btn" onclick="event.stopPropagation();quickPlay(window._cardItems['${item.id}'])"><i class="fa-solid fa-play"></i></button>
        <div class="card-overlay-title">${esc(title)}</div>
        <div class="card-overlay-meta">
          <span class="card-overlay-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
          <span class="card-overlay-year">${year}</span>
        </div>
      </div>
    </div>
    <div class="card-info">
      <div class="card-title">${esc(title)}</div>
      <div class="card-meta">
        <span class="card-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
        <span class="card-year">${year}</span>
      </div>
    </div>`;
            if (!window._cardItems) window._cardItems = {};
            window._cardItems[item.id] = item;
            card.addEventListener('click', () => openDetail(item));
            return card;
        }

        // ── EPISODE DATA ──
        async function fetchSeasonEpisodes(showId, seasonNum) {
            const key = `${showId}-${seasonNum}`;
            if (epCache[key]) return epCache[key];
            try {
                const data = await tmdb(`/tv/${showId}/season/${seasonNum}`);
                epCache[key] = data.episodes || [];
                return epCache[key];
            } catch (e) { return []; }
        }

        // ── FULLSCREEN DETAIL ──
        async function openDetail(item) {
            const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
            let detail = item;
            try {
                const d = await tmdb(`/${type}/${item.id}?append_to_response=credits`);
                detail = { ...d, media_type: type };
            } catch (e) { }
            currentDetail = detail;

            const title = detail.title || detail.name;
            const year = (detail.release_date || detail.first_air_date || '').slice(0, 4);
            const rating = detail.vote_average?.toFixed(1) || null;
            const runtime = detail.runtime
                ? `${Math.floor(detail.runtime / 60)}h ${detail.runtime % 60}m`
                : detail.number_of_seasons
                    ? `${detail.number_of_seasons} Season${detail.number_of_seasons > 1 ? 's' : ''}`
                    : null;
            const genres = (detail.genres || []).map(g => g.name);
            const cast = (detail.credits?.cast || []).slice(0, 6).map(c => c.name).join(', ');
            const director = (detail.credits?.crew || []).filter(c => c.job === 'Director').slice(0, 2).map(c => c.name).join(', ');
            const creator = (detail.created_by || []).map(c => c.name).join(', ');

            // Backdrop
            const heroEl = document.getElementById('dpHero');
            if (detail.backdrop_path) {
                heroEl.style.backgroundImage = `url('${IMG}original${detail.backdrop_path}')`;
                heroEl.style.backgroundSize = 'cover';
                heroEl.style.backgroundPosition = 'center 20%';
            } else {
                heroEl.style.backgroundImage = 'linear-gradient(135deg, #0d0d1a, #1a0a2e)';
            }

            // Type badge
            const badge = document.getElementById('dpTypeBadge');
            badge.className = `dp-type-badge ${type}`;
            badge.innerHTML = type === 'tv' ? '<i class="fa-solid fa-tv"></i> TV SHOW' : '<i class="fa-solid fa-film"></i> MOVIE';

            document.getElementById('dpTitle').textContent = title;

            // Meta row
            const metaRow = document.getElementById('dpMetaRow');
            metaRow.innerHTML = '';
            if (rating) {
                const r = document.createElement('span');
                r.className = 'dp-rating';
                r.innerHTML = `<i class="fa-solid fa-star"></i> ${rating}`;
                metaRow.appendChild(r);
            }
            if (year) { const y = document.createElement('span'); y.className = 'dp-year'; y.textContent = year; metaRow.appendChild(y); }
            if (runtime) { const rt = document.createElement('span'); rt.className = 'dp-runtime'; rt.textContent = runtime; metaRow.appendChild(rt); }
            genres.slice(0, 3).forEach(g => { const t = document.createElement('span'); t.className = 'dp-genre-tag'; t.textContent = g; metaRow.appendChild(t); });

            // Play button
            document.getElementById('dpPlayBtn').onclick = () => {
                if (type === 'tv') {
                    const cw = getCWItem(detail.id);
                    openPlayer(detail, cw?.season || 1, cw?.episode || 1);
                } else {
                    openPlayer(detail, 1, 1);
                }
            };

            // Overview
            document.getElementById('dpOverview').textContent = detail.overview || 'No description available.';

            // Side content
            const side = document.getElementById('dpSideContent');
            side.innerHTML = '';
            const addSide = (label, val) => {
                if (!val) return;
                side.innerHTML += `<div class="dp-side-label">${label}</div><div class="dp-side-val">${val}</div>`;
            };
            if (genres.length) addSide('GENRES', genres.map(g => `<strong>${esc(g)}</strong>`).join(', '));
            if (cast) addSide('CAST', esc(cast));
            if (director) addSide('DIRECTOR', esc(director));
            if (creator) addSide('CREATED BY', esc(creator));
            if (detail.vote_average) addSide('TMDB RATING', `★ ${detail.vote_average.toFixed(1)} / 10`);
            if (detail.status) addSide('STATUS', detail.status);

            // Episodes (TV)
            const epSection = document.getElementById('dpEpSection');
            if (type === 'tv' && detail.seasons) {
                epSection.style.display = 'block';
                const seasons = detail.seasons.filter(s => s.season_number > 0);
                const cw = getCWItem(detail.id);
                currentDetailSeason = cw?.season || 1;

                // Season tabs
                const tabsEl = document.getElementById('seasonTabs');
                tabsEl.innerHTML = seasons.map(s =>
                    `<button class="season-tab ${s.season_number === currentDetailSeason ? 'active' : ''}" onclick="switchDetailSeason(${s.season_number}, this)">Season ${s.season_number}</button>`
                ).join('');

                loadEpisodeCards(detail.id, currentDetailSeason);
            } else {
                epSection.style.display = 'none';
            }

            document.getElementById('detailPage').classList.add('open');
            document.body.style.overflow = 'hidden';
            document.getElementById('detailPage').scrollTop = 0;
        }

        function switchDetailSeason(seasonNum, btn) {
            currentDetailSeason = seasonNum;
            document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            loadEpisodeCards(currentDetail.id, seasonNum);
        }

        async function loadEpisodeCards(showId, seasonNum) {
            const grid = document.getElementById('epGrid');
            grid.innerHTML = `<div class="ep-grid-loading"><div class="spin"></div><span>LOADING EPISODES</span></div>`;

            const episodes = await fetchSeasonEpisodes(showId, seasonNum);

            if (!episodes.length) {
                grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><div class="state-icon" style="color:rgba(191,0,255,0.2)"><i class="fa-solid fa-tv"></i></div><div class="state-title">NO EPISODES FOUND</div></div>`;
                return;
            }

            grid.innerHTML = '';
            episodes.forEach((ep, i) => {
                const card = document.createElement('div');
